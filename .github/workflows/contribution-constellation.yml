name: Update contribution constellation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/contribution-constellation.yml
      - scripts/generate-contribution-constellation.mjs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate contribution constellation
        env:
          GH_USERNAME: hia-aggrawal
        run: node scripts/generate-contribution-constellation.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-constellation.svg
          git diff --staged --quiet || git commit -m "chore: update contribution constellation"
          git push
